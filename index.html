<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Lights Serenade / Hatsune Miku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
</head>
<body>

  <div id="media"></div>
  <div id="bg"></div>
  <canvas id="particles"></canvas>

  <!-- ══ INTRO SCREEN ══ -->
  <div id="intro-screen">
    <div id="intro-header">
      <div id="intro-title">Green Lights Serenade</div>
      <div id="intro-artist">Hatsune Miku / Omoi</div>
      <div id="intro-instruction">Catch the notes to start! 🎵</div>
    </div>
    <div id="note-counter">
      <div id="note-progress-wrap">
        <div id="note-progress-fill"></div>
      </div>
      <div id="note-count-label"><span id="note-count">0</span> / 5 notes caught</div>
    </div>
    <div id="intro-miku-wrap">
      <img id="intro-miku" src="miku_image.png" alt="Miku"/>
    </div>
    <div id="notes-field"></div>
    <div id="win-overlay">
      <div id="win-text">🎉 Let's Go! 🎉</div>
      <div id="win-sub">Green Lights Serenade is starting...</div>
    </div>
  </div>

  <!-- ══ PLAYER SCREEN ══ -->
  <div id="app" class="hidden">

    <!-- Score HUD -->
    <div id="hud">
      <div id="score-wrap">
        <div id="score-label">SCORE</div>
        <div id="score">0</div>
      </div>
      <div id="combo-wrap">
        <div id="combo-label">COMBO</div>
        <div id="combo">0</div>
        <div id="combo-x">x</div>
      </div>
    </div>

    <!-- Falling notes during gameplay -->
    <div id="game-notes-field"></div>

    <div id="header">
      <div id="song-title">Green Lights Serenade</div>
      <div id="song-artist">Hatsune Miku / Omoi</div>
    </div>

    <div id="main-content">
      <div id="lyric-stage">
        <div id="lyric-char"></div>
        <div id="lyric-word"></div>
        <div id="lyric-phrase"></div>
        <div id="lyric-translation"></div>
      </div>
      <div id="character-wrap">
        <img id="miku-img" src="miku_image.png" alt="Miku"/>
      </div>
    </div>

    <div id="controls">
      <div id="control-buttons">
        <button id="btn-play" disabled>▶ PLAY</button>
        <button id="btn-stop" disabled>■ STOP</button>
      </div>
      <div id="seek-container">
        <div id="seek-bar"><div id="seek-fill"></div></div>
        <div id="time-display">0:00 / 0:00</div>
      </div>
    </div>

    <div id="loading">
      <div id="loading-icon">⟳</div>
      <div id="loading-text">Loading Green Lights Serenade...</div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>

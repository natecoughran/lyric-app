<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Lights Serenade / Hatsune Miku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
</head>
<body>

  <div id="media"></div>
  <canvas id="particles"></canvas>

  <!-- ══ INTRO BG (bright teal/pink gradient) ══ -->
  <div id="intro-bg"></div>

  <!-- ══ LEVEL BG (dark green/black/pink) ══ -->
  <div id="level-bg" class="hidden"></div>

  <!-- ══ INTRO SCREEN ══ -->
  <div id="intro-screen">
    <div id="intro-header">
      <div id="intro-title">Green Lights Serenade</div>
      <div id="intro-artist">Hatsune Miku / Omoi</div>
      <div id="intro-instruction">Catch the notes to start! 🎵</div>
    </div>
    <div id="note-counter">
      <div id="note-progress-wrap"><div id="note-progress-fill"></div></div>
      <div id="note-count-label"><span id="note-count">0</span> / 5 notes caught</div>
    </div>
    <div id="intro-miku-wrap">
      <img id="intro-miku" src="miku_image.png" alt="Miku"/>
    </div>
    <div id="notes-field"></div>
  </div>

  <!-- ══ LET'S GO SCREEN ══ -->
  <div id="lets-go-screen" class="hidden">
    <div id="lets-go-text">🎉 Let's Go! 🎉</div>
    <div id="lets-go-sub">Ready for Level 1?</div>
    <button id="btn-lets-go-play">▶ Start Playing!</button>
  </div>

  <!-- ══ LEVEL 1 SCREEN ══ -->
  <div id="level1-screen" class="hidden">

    <!-- HUD -->
    <div id="hud">
      <div id="level-badge">LEVEL 1</div>
      <div id="hud-controls">
        <button id="btn-play-pause">⏸ PAUSE</button>
        <button id="btn-stop">■ STOP</button>
      </div>
      <div id="score-wrap">
        <div id="score-label">SCORE</div>
        <div id="score">0</div>
      </div>
    </div>

    <!-- Two column: quiz left, Miku right -->
    <div id="level1-main">

      <!-- LEFT: Quiz -->
      <div id="quiz-panel">
        <div id="quiz-header-text">⭐ Miku Quiz ⭐</div>
        <div id="quiz-progress-wrap">
          <div id="quiz-progress-fill"></div>
        </div>
        <div id="quiz-q-label">Question <span id="quiz-q-num">1</span> of 4</div>
        <div id="quiz-question"></div>
        <div id="quiz-answers"></div>
        <div id="quiz-feedback"></div>
        <div id="quiz-bonus-wrap">
          <span id="quiz-bonus-label">QUIZ BONUS:</span>
          <span id="quiz-bonus-score">0</span>
        </div>
        <div id="quiz-done-msg" class="hidden">
          🎉 Quiz complete! Great job!
        </div>
      </div>

      <!-- RIGHT: Big alien Miku -->
      <div id="level1-miku-wrap">
        <img id="level1-miku" src="miku_alien.png" alt="Alien Miku"/>
      </div>

    </div>

    <!-- Seek bar at bottom -->
    <div id="controls-bar">
      <div id="seek-bar"><div id="seek-fill"></div></div>
      <div id="time-display">0:00 / 0:00</div>
    </div>

    <!-- Loading overlay -->
    <div id="loading">
      <div id="loading-icon">⟳</div>
      <div id="loading-text">Loading Green Lights Serenade...</div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
